<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Aviator Predictor - By TOJO</title>
  <link rel="stylesheet" href="style.css">
<script src="script.js"></script>
<style>
body {
  margin: 10px;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);

}
  .title-box {
  width: 90%;
  max-width: 900px;
  margin: 10px auto;
  padding: 20px;

  background: rgba(0,0,0,0.3);

  box-shadow:
    0 0 20px rgba(0,255,150,0.2),
    inset 0 0 10px rgba(0,255,150,0.1);
}

.main-title {
  font-size: 60px;
  font-weight: bold;
  color: #ffffff;

  text-shadow:
    0 0 0px #00f5a0,
    0 0 0px #00d9f5,
    0 0 0px #a100ff;
}

.creator {
  margin-top: 10px;
  font-size: 40px;
  font-family: 'JetBrains Mono', monospace;
  color: #00ffcc;
  opacity: 012;
}
  .section-title {
  font-size: 45px; /* ngeza */
  text-align: center;
  margin-bottom: 20px;

  /* Couleur azo ovaina mora */
  color: #38bdf8;

  /* effet glow */
  

  letter-spacing: 1px;
}
  
/* HEADER */
.header {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 15px 20px;
}

.logo {
  font-size: 18px;

/* CLOCK NEON */
.clock-container {
  
  position: absolute;
  top: 50%;
  left: 50%;

}
/* Ilay span */
#clock {
   padding: 10px 10px;
  border-radius: 15px;

  background: rgba(0, 0, 0, 0.4);
  border: 1px solid rgba(0,255,150,0.2);
  font-family: 'Courier New', monospace;
  font-size: 50px;
  letter-spacing: 6px;
  color: #00ff99;

  /* GLOW TEXT */
  text-shadow:
    0 0 0px #00ff99,
    0 0 0px #00ff99,
    0 0 0px #00ff99;

  /* GLOW BOX */
  box-shadow:
    0 0 20px rgba(0,255,150,0.3),
    0 0 60px rgba(0,255,150,0.2),

}
/* CARD */
.card {
  width: 98%;
  max-width: 900px;
  margin: 20px auto;
  padding: 10px;
  border-radius: 60px;

 .input-with-btn {

}

.input-with-btn input {

}

.analyze-btn {
  width: 50%;
  position: absolute;
  gap: 100px;
  height: 75px;    
  right: 90px;

.analyze-btn:hover {

}

  .btn-group {
  display: flex;
  gap: 40px;
  margin-top: 15px;
}

.btn-group button {
  flex: 1;
}
  
/* INPUT */
input {
  width: 30%;
  padding: 20px;
  border-radius: 18px;
  border: none;
  outline: none;
  margin-top: 10px;
  background: rgba(255,255,255,0);
  border: 3px solid rgba(0,255,150,0.2);
  color:  white;
  font-size: 40px;
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
    box-shadow: 0 0 90px rgba(30, 92, 196, 0.4);
    inset 0 0 15px rgba(0,255,150,0.15);
}
  
.input-group {
  border: 1px solid rgba(0,255,255,0.15);
  box-shadow: 
    0 0 10px rgba(0,255,255,0.08),
    inset 0 0 5px rgba(0,255,255,0.05);
  border-radius: 20px;
  padding: 20px;
  margin-top: 15px;

  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(15px);

  box-shadow:
    0 8 25px rgba(0,0,0,0.4),
    inset 0 0 10px rgba(255,255,255,0.01);
}
  
/* BUTTON */
.btn {
  width: 200%;
  padding: 15px;
  margin-top: 15px;
  border-radius: 12px;
  border: none;
  font-weight: bold;
  cursor: pointer;
  background: linear-gradient(90deg,#00f5a0,#00d9f5,#a100ff);
  color: white;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #00f5a0;
}

/* RESULT */
.result-container {
  margin-top: 25px;
  padding: 20px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  box-shadow: 0 0 25px rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
  font-size: 40px;
}

.stat-grid {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 15px;
  margin-top: 15px;
}

.stat-card {
  padding: 15px;
  border-radius: 15px;
  background: rgba(255,255,255,0.05);
  text-align: center;
  font-size: 40px;
  box-shadow: 0 0 15px rgba(0,0,0,0.3);
  
}

.big-card {
  margin-top: 20px;
  padding: 20px;

  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,0,0,0.2);
}

.confidence-text {
  font-size: 50px;
  color: #ff4d4d;
  text-align: right;
}

.bar {
  height: 10px;
  background: #1e293b;
  border-radius: 10px;
  margin: 10px 0;
}

.fill {
  height: 100%;
  border-radius: 10px;
  background: linear-gradient(90deg,#ff4d4d,#00ff99);
}

.duo {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

.box {
  flex: 1;
  padding: 15px;
  border-radius: 15px;
  text-align: center;
  font-weight: bold;
}

  .time-box-wrapper {
  border: 1px solid rgba(255,255,0,0.15);
  box-shadow:
    0 0 10px rgba(255,255,0,0.08),
    inset 0 0 5px rgba(255,255,0,0.05);
  border-radius: 35px;
  padding: 30px;
  margin-top: 40px;

  background: rgba(0,0,0,0.2);

  
}

.time-input {
  display: flex;
  gap: 20px;
  margin-top: 5px;
  align-items: center;
}

.time-input input {
  width: 120px;        /* ➜ mampihena largeur */
  height: 30px;        /* ➜ taille fixe */
  font-size: 40px;     /* ➜ soratra kely kokoa */
  text-align: center;
  border-radius: 12px;
}
  
.time-box {
  
  width : 300px;
  background: rgba(0,255,150,0.1);
  color: #00ffcc;
}

.multi-box {
  background: rgba(150,0,255,0.1);
  color: #c084fc;
}
  
  .quick-mult {
  display: flex;
  gap: 28px;
  margin-top: 10px;
  flex-wrap: wrap;
  
}

.quick-mult button {
  flex: 1;
  padding: 20px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-size: 40px;

  background: rgba(0,255,150,0.15);
  color: yellow;
  font-weight: bold;

  transition: 0.2s;
}

.quick-mult button:hover {
  background: #00ffcc;
  color: black;
  transform: scale(1.05);
}
  
  .code-box-wrapper {
  width: 92%;
  max-width: 900px;
  margin: 35px auto;
  padding: 35px;

  border-radius: 20px;
  border: 1px solid rgba(0,200,255,0.15);
  box-shadow:
    0 0 10px rgba(0,200,255,0.08),
    inset 0 0 5px rgba(0,200,255,0.05);
    
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(10px);

}

.code-inputs {
  display: flex;
  gap: 20px;
  margin-top: 28px;
  
}

.code-inputs input {
  flex: 1;
  text-align: center;
}
  .disclaimer {
  width: 87%;
  max-width: 900px;
  margin: 40px auto;

  padding: 35px;
  border-radius: 20px;

  border: 1px solid rgba(255,255,255,0.1);

  background: rgba(255,255,255,0);
  backdrop-filter: blur(10px);

  color: white;
  font-size: 23px;
  text-align: center;

  font-family: 'Courier New', monospace;
  font-weight: 900;
  box-shadow:
    0 0 15px rgba(0,0,0,0.4),
    inset 0 0 5px rgba(255,255,255,0.05);
}
  
  .settings {
  position: fixed;
  top: 10px;
  right: 10px;
  z-index: 1000;
}

.settings button {
  padding: 20px;
  width: 80px;
  
font-size: 34px; /* ➜ emoji lehibe */
  border-radius: 50%;
  border: none;
  cursor: pointer;
  background: rgba(0,0,0,0.6);
  color: white;
  backdrop-filter: blur(10px);
}

/* BACKGROUND OVERLAY */
.settings-panel {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(5px);
  z-index: 999;
  justify-content: center;
  align-items: center;
}

/* BOX */
.settings-box {
  width: 300px;
  padding: 20px;
  border-radius: 20px;

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);

  color: white;
  text-align: center;

  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

.settings-box .item {
  display: flex;
  justify-content: space-between;
  margin: 15px 0;
}

.close-btn {
  margin-top: 10px;
  width: 100%;
  padding: 10px;
font-size: 18px;
  border: none;
  border-radius: 10px;

  background: #00ffcc;
  color: black;
  font-weight: bold;
  cursor: pointer;
}
  .settings-box .item {
  font-size: 26px;
  padding: 8px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

.settings-box .item:last-child {
  border-bottom: none;
}
  .warning-footer {
  margin-top: 35px;
  padding: 12px;
  text-align: center;

  font-size: 30px;
  font-weight: bold;
  letter-spacing: 1px;

  color: #00ffcc; /* jaune doux */

  border: 1px solid rgba(0,200,255,0.15);
  box-shadow:
    0 0 10px rgba(0,200,255,0.08),
    inset 0 0 5px rgba(0,200,255,0.05);
  border: 1px solid rgba(250, 204, 21, 0.3);

  border-radius: 12px;

  text-shadow:
    0 0 5px rgba(250, 204, 21, 0.6),
    0 0 10px rgba(250, 204, 21, 0.4);

  

  animation: softBlink 1.8s infinite;
}
  
  .jackpot {
  margin-top: 8px;
  font-size: 16px;
  font-weight: bold;
  color: #facc15;

  text-shadow:
    0 0 5px #facc15,
    0 0 15px #facc15,
    0 0 25px #ff9900;

  animation: jackpotFlash 1s infinite;
}

@keyframes jackpotFlash {
  0% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.1); opacity: 0.7; }
  100% { transform: scale(1); opacity: 1; }
}
  
  
.multiplier { background: #28a745; }   /* vert */
.round { background: #17a2b8; }        /* bleu turquoise */
.confidence { background: #ffc107; color:#333; }   /* jaune */
.extra { background: #6f42c1; }        /* violet */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
canvas {
  margin-top: 10px;
}
</style>
</head>
<body>
   
  
<div class="settings">
  <button onclick="toggleSettings()">⚙️</button>
</div>

<div class="settings-panel" id="settingsPanel">
  
  <div class="settings-box">
    <h3>⚙️ Paramètres</h3>

    <div class="item">
      🔊 Son
      <input type="checkbox" checked onchange="toggleSound(this)">
    </div>

    <div class="item">
      🔔 Notifications
      <input type="checkbox" checked onchange="toggleNotif(this)">
    </div>

    <button class="close-btn" onclick="toggleSettings()">Fermer</button>
  </div>

</div>
<div class="header">
  <span id="clock"></span>
</div>
  
<div class="title-box">
  <div class="main-title">✈️ Aviator Predictor</div>
  <div class="creator">Créateur : TOJO✨</div>
</div>
   
  <div class="disclaimer">
  ⚠️ Ce système n’est pas fiable à 100%. Les résultats sont basés sur des estimations et peuvent varier.
</div>
  
<div class="container">
<div class="card">
  <h3 class="section-title">ENTRER les DONNEES</h3>
  
  <div class="input-group">
  <label>Ampidiro ny Tour farany</label><br>
  
    <input type="number" id="lastMult" placeholder="ex: 2.5">
  <button class="analyze-btn" onclick="predict()">✨ANALYSER</button>
<div class="quick-title">⚡ Choix rapide</div>
<div class="quick-mult">
  <button onclick="setMult(1.11)">1.11x</button>
  <button onclick="setMult(1.12)">1.12x</button>
  <button onclick="setMult(1.16)">1.16x</button>
  <button onclick="setMult(1.0)">1.0x</button>
  <button onclick="setMult(1.04)">1.04x</button>
   <button onclick="setMult(2.26)">2.26x</button>
  <button onclick="setMult(3.36)">3.36x</button>
  <button onclick="setMult(4.46)">4.46x</button>
  <button onclick="setMult(5.0)">5.0x</button>
  <button onclick="setMult(6.46)">6.46x</button>
  <button onclick="setMult(7.0)">7.0x</button>
  <button onclick="setMult(10.04)">10.04x</button>
 
</div>
</div>
<div class="time-box-wrapper">
  <label>Apidiro ny Heure</label>
  <div class="time-input">
    <input type="number" id="hh" placeholder="HH">
    <input type="number" id="mm" placeholder="MM">
  </div>
</div>
  
  <div class="code-box-wrapper">

  <label>Codes 3 dernier (Hex & Décimal)</label>

  <div class="code-inputs">
    <input type="text" id="hex" placeholder="Hex (ex: A3F)">
    <input type="number" id="dec" placeholder="Décimal (ex: 127)">
  </div>

</div>
  <div class="warning-footer">
🚫⚠️ INTERDIT : AZA MIDITRA RAHA SENDRA RATSY NY TOUR
</div>
  
  <div class="result" id="result"></div>
  <canvas id="confidenceChart" width="400" height="200"></canvas>
</div>
</div>

<script>
  
  function toggleSettings(){
  let panel = document.getElementById("settingsPanel");
  panel.style.display = panel.style.display === "flex" ? "none" : "flex";
}

/* 🌙 THEME */
function toggleTheme(el){
  if(el.checked){
    document.body.style.background = "radial-gradient(circle at top, #0f172a, #020617)";
    document.body.style.color = "#e2e8f0";
  } else {
    document.body.style.background = "#f5f5f5";
    document.body.style.color = "#111";
  }
}

/* 🔊 SON */
let soundEnabled = true;
function toggleSound(el){
  soundEnabled = el.checked;
}

/* 🔔 NOTIF */
let notifEnabled = true;
function toggleNotif(el){
  notifEnabled = el.checked;
}
  
// Horloge en temps réel
function updateClock() {
  const now = new Date();
  document.getElementById("clock").innerText = now.toLocaleTimeString();
}
setInterval(updateClock, 1000);

// Transition matrix simplifiée
const transitions = {
  faible: {faible:0.5, moyen:0.4, fort:0.1},
  moyen: {faible:0.3, moyen:0.4, fort:0.3},
  fort:  {faible:0.2, moyen:0.3, fort:0.5}
};

function getState(mult){
  if(mult<2) return "faible";
  else if(mult<=5) return "moyen";
  else return "fort";
}

function nextState(current){
  let r=Math.random(), sum=0;
  for(let s in transitions[current]){
    sum+=transitions[current][s];
    if(r<=sum) return s;
  }
  return "moyen";
}

let chart; // Chart.js instance

  function setMult(value){
  document.getElementById("lastMult").value = value;
}
  
function predict(){

  let lastMult = document.getElementById("lastMult").value;
  let hex = document.getElementById("hex").value;
  let dec = document.getElementById("dec").value;

  // ✅ CHECK: raha tsisy donnée
  if(lastMult === "" && hex === "" && dec === ""){
    document.getElementById("result").innerHTML = `
      <div style="
        margin-top:25px;
        padding:15px;
        border-radius:15px;
        background:rgba(255,0,0,0.15);
        color:white;
        text-align:center;
        font-weight:bold;
        animation: fadeIn 0.3s ease;
      ">
        ⚠️ Mampidira données aloha vao afaka m'ANALYSER☝️
      </div>
    `;
    return;
  }

  // traitement normal
  lastMult = parseFloat(lastMult) || 2.0;
  hex = hex || "A3F";
  dec = parseInt(dec) || 127;

  let currentState = getState(lastMult);
  let next = nextState(currentState);

  let multiplier;
  if(next==="faible") multiplier=(Math.random()*1.5+1).toFixed(2);
  else if(next==="moyen") multiplier=(Math.random()*3+2).toFixed(2);
  else multiplier=(Math.random()*5+5).toFixed(2);
  
  let isJackpot = false;

if(multiplier >= 50){
  isJackpot = true;
}

  // ⏱ durée d’un tour (en secondes)
let tourDuration = 10;

// 🔢 nombre de tours
let tours = 3;

// total temps
let totalSeconds = tourDuration * tours;

// calcul heure exacte
let now = new Date();
now.setSeconds(now.getSeconds() + totalSeconds);

let nextRound = now.toLocaleTimeString();

  let confidenceValue=(transitions[currentState][next]*100).toFixed(0);

  document.getElementById("result").innerHTML = `
    <div class="result-container">
      <div class="stat-grid">
        <div class="stat-card">📊 Moyenne<br><b>x${multiplier}</b></div>
        <div class="stat-card">📈 Max<br><b>x${(multiplier*1.5).toFixed(2)}</b>
  ${isJackpot ? `<div class="jackpot">🔥 JACKPOT 🔥</div>` : ""}</div>
       <div class="stat-card">
📉 Min<br>
<b>x${Math.max(1, (multiplier/2).toFixed(2))}</b>
</div>
        <div class="stat-card">🔢  Tours<br><b>${tours}</b></div>
      </div>

      <div class="big-card">
        <div style="display:flex; justify-content:space-between;">
          <div>⚡ Confiance</div>
          <div class="confidence-text">${confidenceValue}%</div>
        </div>

        <div class="bar">
          <div class="fill" style="width:${confidenceValue}%"></div>
        </div>

        <div class="duo">
          <div class="box time-box">
            ⏱ Heure<br>${nextRound}
          </div>
          <div class="box multi-box">
            🎯 Multi<br>x${multiplier}
          </div>
        </div>
      <div style="margin-top:10px; text-align:center; opacity:0.7;">
  Dans environ <b>${tours} tours</b>
</div>
  `;
}
function reset(){
  document.getElementById("lastMult").value="";
  document.getElementById("hex").value="";
  document.getElementById("dec").value="";
  document.getElementById("result").innerHTML="";
  if(chart) chart.destroy();
}
</script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js")
    .then(() => console.log("Service Worker enregistré"))
    .catch(err => console.error("Erreur SW:", err));
}
</script>
</body>
</html>
